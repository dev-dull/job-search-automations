# Default values for job-store.

image:
  repository: ghcr.io/dev-dull/job-store
  tag: latest
  pullPolicy: IfNotPresent

# Pull secrets for a private GHCR package. Leave empty if the package is public.
# e.g. imagePullSecrets: [{name: ghcr-creds}]
imagePullSecrets: []

# Single writer: SQLite tolerates exactly one writer, so the Deployment uses a
# Recreate strategy and this MUST stay 1 until the data layer moves off SQLite.
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 5000

# External exposure. Disabled by default — clusters without an ingress
# controller reach the inbox via `kubectl port-forward` or a LoadBalancer
# Service. The inbox has NO authentication, so only expose it on a trusted
# network (tailnet / WireGuard / VPN), never the public internet. See README.
ingress:
  enabled: false
  className: ""
  # Controller / cert-manager hints, e.g.:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  annotations: {}
  hosts:
    - host: job-store.local
      paths:
        - path: /
          pathType: Prefix
  # cert-manager populates the named Secret from the issuer, e.g.:
  #   - secretName: job-store-tls
  #     hosts: [job-store.example.com]
  tls: []

# Probes hit `/`, which returns 200 once db.py has initialized the schema.
probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10

# Extra environment variables appended to the container, as a list of
# {name, value} (or {name, valueFrom}) entries. Server-side scoring needs
# ANTHROPIC_API_KEY and RESUME_PATH — those are wired via the Secret (issue #37);
# until that lands, the inbox runs and probes pass without them (scoring fails
# until configured). Use extraEnv for any other app-level config.
extraEnv: []

# Persistent storage for jobs.db (and its WAL/SHM siblings, which MUST sit on
# the same volume). When disabled, /data is an emptyDir — fine for dev/test
# clusters where the inbox is disposable.
# Anthropic API key + resume content. The resume is a Secret (not a ConfigMap)
# because it holds personal information.
secret:
  # true: the chart creates the Secret from the values below (quick start).
  # false: set existingSecret to a Secret you manage out-of-band
  # (sealed-secrets / external-secrets / SOPS / Vault) that carries the same two
  # keys — `anthropic-api-key` and `resume.yaml`.
  create: true
  existingSecret: ""
  # API key is always required. The resume requirement is conditional — see
  # resume.fromSecret below.
  anthropicApiKey: ""
  # Resume content (any text format — YAML/JSON/Markdown/LaTeX/HTML; read
  # verbatim, never parsed). Required when create=true and resume.fromSecret.
  resume: ""

# Resume sourcing. The resume isn't a credential; by default it's projected from
# the Secret (back-compat), but you can source it independently — e.g. an
# initContainer that git-clones a resume-as-code repo into an extraVolume.
resume:
  # Where the app reads the resume (RESUME_PATH). Any extension — the file is
  # read as text. Default is .yaml; set .json/.md/.tex/.html to match yours.
  path: /etc/job-store/resume.yaml
  # true: mount the resume from the Secret (requires secret.resume when
  # secret.create). false: the chart mounts no resume — provide it yourself via
  # initContainers + extraVolumes/extraVolumeMounts at resume.path.
  fromSecret: true

persistence:
  enabled: true
  # "" uses the cluster's default StorageClass; "-" disables dynamic
  # provisioning (binds a pre-created PV); any other value names a class.
  storageClass: ""
  size: 5Gi
  accessModes:
    - ReadWriteOnce

# Scheduled poller (Kubernetes CronJob). The poller is a pure HTTP client of
# job-store — it needs only JOB_STORE_URL, no DB/PVC and no Secret.
poller:
  enabled: true
  # Raw cron string. When set, it takes precedence over scheduleSpec below
  # (escape hatch for arbitrary expressions).
  schedule: ""
  # Friendly schedule, used when `schedule` is empty. Choose how often to poll
  # without writing cron:
  scheduleSpec:
    # Which days to run. cron day-of-week field: "*" = every day,
    # "1-5" = Mon-Fri, "0,6" = weekends, "1,3,5" = Mon/Wed/Fri.
    daysOfWeek: "*"
    # Specific clock times (24h "HH:MM"). When non-empty, each time becomes its
    # own CronJob — e.g. ["08:00", "13:00", "18:00"].
    times: []
    # Used ONLY when `times` is empty: run this many times/day, evenly spaced on
    # the hour starting at 00:00. 6 == every 4 hours (the default cadence).
    timesPerDay: 6
  # Image for the poller; defaults to the main image when left blank.
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  args: ["--max-new", "50"]
  # Forbid: overlapping pollers would race and burn redundant Anthropic spend.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  activeDeadlineSeconds: 1800
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Generic pod passthroughs (e.g. to git-clone the resume in an initContainer, or
# run a sidecar that keeps it fresh). All default empty.
initContainers: []        # extra initContainers (list of container specs)
extraContainers: []       # sidecar containers alongside job-store
extraVolumes: []          # extra pod volumes
extraVolumeMounts: []     # extra mounts on the job-store container

nameOverride: ""
fullnameOverride: ""
