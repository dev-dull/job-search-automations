{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "job-store.secretName" . }}
  labels:
    {{- include "job-store.labels" . | nindent 4 }}
type: Opaque
stringData:
  anthropic-api-key: {{ required "secret.anthropicApiKey is required when secret.create=true (or set secret.create=false and secret.existingSecret)" .Values.secret.anthropicApiKey | quote }}
  {{- if .Values.resume.fromSecret }}
  # Format-neutral key: the resume can be YAML/JSON/Markdown/LaTeX/HTML — it's
  # read verbatim. The mounted filename comes from resume.path.
  resume: |
    {{- required "secret.resume is required when secret.create=true and resume.fromSecret=true (set resume.fromSecret=false to source the resume elsewhere)" .Values.secret.resume | nindent 4 }}
  {{- end }}
{{- end }}
