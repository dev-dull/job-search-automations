apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "job-store.fullname" . }}
  labels:
    {{- include "job-store.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate, never RollingUpdate: two pods would mean two SQLite writers and
  # corrupt the DB. Do not change without moving off SQLite.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "job-store.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "job-store.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 999
        # fsGroup so the persistence PVC is group-writable by the runtime user;
        # harmless for the emptyDir fallback.
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: job-store
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 5000
          env:
            # DB on the writable /data mount (a PVC by default; emptyDir when
            # persistence is disabled). See persistence.* in values.yaml.
            - name: JOBS_DB_PATH
              value: /data/jobs.db
            # HOME on writable /tmp so gunicorn's control socket and worker
            # heartbeat files don't hit the read-only root filesystem.
            - name: HOME
              value: /tmp
            # Server-side scoring credentials. The key comes from the Secret;
            # the resume is file-mounted (see the resume volume below).
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "job-store.secretName" . }}
                  key: anthropic-api-key
            - name: RESUME_PATH
              value: /etc/job-store/resume.yaml
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: resume
              mountPath: /etc/job-store
              readOnly: true
      volumes:
        # jobs.db (+ WAL/SHM). Backed by a PVC so state survives pod restarts;
        # emptyDir (disposable) when persistence is disabled. fsGroup (above)
        # makes the mount writable by the non-root runtime user.
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "job-store.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        # Writable scratch required because the root filesystem is read-only:
        # gunicorn worker heartbeat + control socket (via HOME=/tmp) and tmpfiles.
        - name: tmp
          emptyDir: {}
        # Resume YAML projected from the Secret as a single read-only file at
        # /etc/job-store/resume.yaml (the anthropic key is env-only, not a file).
        - name: resume
          secret:
            secretName: {{ include "job-store.secretName" . }}
            items:
              - key: resume.yaml
                path: resume.yaml
