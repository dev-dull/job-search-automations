apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "job-store.fullname" . }}
  labels:
    {{- include "job-store.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate, never RollingUpdate: two pods would mean two SQLite writers and
  # corrupt the DB. Do not change without moving off SQLite.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "job-store.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "job-store.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 999
        # fsGroup so a mounted volume (the PVC in #36) is group-writable by the
        # runtime user; harmless for the emptyDirs used here.
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: job-store
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 5000
          env:
            # DB on the writable /data mount (emptyDir here; PVC in #36).
            - name: JOBS_DB_PATH
              value: /data/jobs.db
            # HOME on writable /tmp so gunicorn's control socket and worker
            # heartbeat files don't hit the read-only root filesystem.
            - name: HOME
              value: /tmp
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        # jobs.db. emptyDir => lost on pod restart; #36 replaces this with a PVC.
        - name: data
          emptyDir: {}
        # Writable scratch required because the root filesystem is read-only:
        # gunicorn worker heartbeat + control socket (via HOME=/tmp) and tmpfiles.
        - name: tmp
          emptyDir: {}
