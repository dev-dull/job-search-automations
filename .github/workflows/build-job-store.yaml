name: Build job-store image

# Builds and pushes the job-store container image to GHCR, baking in the latest
# signed Firefox .xpi. Triggers on job-store source changes on main, on manual
# dispatch, and via workflow_call from sign-extension.yaml after a new plugin is
# signed (so a plugin release produces a fresh image containing it).
on:
  push:
    branches: [main]
    paths:
      - 'job-board/job-store/**'
      # Exclude paths that don't affect the image (Helm chart, tests, docs are
      # .dockerignore'd or out-of-image), so chart/doc edits don't rebuild it.
      - '!job-board/job-store/helm/**'
      - '!job-board/job-store/tests/**'
      - '!job-board/job-store/**.md'
      - '.github/workflows/build-job-store.yaml'
  workflow_dispatch:
  workflow_call:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/job-store

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Bake in the latest signed extension (best-effort)
        # Pull the stable-named asset from the latest release into the build
        # context so the Dockerfile bakes it in. Absent (no release yet) → build
        # without it; the inbox just hides the install link.
        run: |
          mkdir -p job-board/job-store/extension
          if curl -fSL -o job-board/job-store/extension/job-fit-scorer.xpi \
               "https://github.com/${{ github.repository }}/releases/latest/download/job-fit-scorer.xpi"; then
            echo "baked in signed extension"
          else
            echo "no signed extension release yet; building without it"
            rm -f job-board/job-store/extension/job-fit-scorer.xpi
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Always :latest + :{git-sha}. This workflow only runs on main pushes,
          # manual dispatch, and workflow_call from a release — all of which
          # should advance :latest (a release-triggered build runs on the tag
          # ref, so is_default_branch wouldn't fire).
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: job-board/job-store
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
