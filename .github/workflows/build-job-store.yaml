name: Build job-store image

# Builds and pushes the job-store container image to GHCR. Triggers on changes
# to the job-store source (or this workflow) on main, and on manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'job-board/job-store/**'
      # Exclude paths that don't affect the image (Helm chart, tests, docs are
      # .dockerignore'd or out-of-image), so chart/doc edits don't rebuild it.
      - '!job-board/job-store/helm/**'
      - '!job-board/job-store/tests/**'
      - '!job-board/job-store/**.md'
      - '.github/workflows/build-job-store.yaml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/job-store

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # :{git-sha} always; :latest only on the default branch.
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: job-board/job-store
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
