name: Sign Firefox extension

# Signs the plugin via Mozilla AMO as an UNLISTED (self-distributed) add-on and
# publishes the signed .xpi to the floating `plugin-latest` release. Unlisted
# signing is automated (no human review), produces a .xpi installable on stock
# release Firefox, and is NOT publicly listed on addons.mozilla.org.
#
# Triggered by pushing a `plugin-v*` tag — a namespace separate from the Gemini
# Actions' `vX.Y.Z` releases (cut-release.yaml), so plugin and action versions
# don't collide. The `plugin-latest` release is NOT marked "Latest", so it never
# displaces the actions' latest release.
#
# Requires two repo secrets from https://addons.mozilla.org/developers/addon/api/key/:
#   AMO_JWT_ISSUER, AMO_JWT_SECRET
#
# Bump firefox-plugin/manifest.json "version" before tagging — AMO refuses to
# re-sign a version it has already signed.
on:
  push:
    tags: ['plugin-v*']
  workflow_dispatch:

permissions:
  contents: write   # publish the plugin-latest release

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sign (unlisted) via AMO
        run: |
          npx --yes web-ext@latest sign \
            --channel=unlisted \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --source-dir=job-board/firefox-plugin \
            --artifacts-dir=web-ext-artifacts

      - name: Add a stable-named copy
        # A predictable asset name (job-fit-scorer.xpi) lets the image build pull
        # it from releases/download/plugin-latest/ without knowing web-ext's
        # versioned filename. Renaming a signed xpi is safe (signature is inside).
        run: |
          src=$(ls web-ext-artifacts/*.xpi | head -1)
          cp "$src" web-ext-artifacts/job-fit-scorer.xpi

      - uses: actions/upload-artifact@v4
        with:
          name: signed-xpi
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error

      - name: Publish to the plugin-latest release
        # Floating release the image build fetches from. make_latest:false so it
        # doesn't displace the Gemini Actions' latest (vX.Y.Z) release.
        uses: softprops/action-gh-release@v3
        with:
          tag_name: plugin-latest
          name: Firefox extension (latest signed)
          make_latest: "false"
          files: web-ext-artifacts/*.xpi

  # Rebuild the container image so it bakes in the just-signed plugin. Runs after
  # the asset is published to plugin-latest, which the build then fetches.
  build-image:
    needs: sign
    uses: ./.github/workflows/build-job-store.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
