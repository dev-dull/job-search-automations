name: Sign Firefox extension

# Signs the plugin via Mozilla AMO as an UNLISTED (self-distributed) add-on and
# publishes the signed .xpi to the floating `plugin-latest` release. Unlisted
# signing is automated (no human review), produces a .xpi installable on stock
# release Firefox, and is NOT publicly listed on addons.mozilla.org.
#
# Triggered by pushing a `plugin-v*` tag — a namespace separate from the Gemini
# Actions' `vX.Y.Z` releases (cut-release.yaml), so plugin and action versions
# don't collide. The `plugin-latest` release is NOT marked "Latest", so it never
# displaces the actions' latest release.
#
# Requires two repo secrets from https://addons.mozilla.org/developers/addon/api/key/:
#   AMO_JWT_ISSUER, AMO_JWT_SECRET
#
# Bump firefox-plugin/manifest.json "version" before tagging — AMO refuses to
# re-sign a version it has already signed.
on:
  push:
    tags: ['plugin-v*']
  workflow_dispatch:

permissions:
  contents: write   # publish the plugin-latest release

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject self-hosted update_url (if configured)
        # Optional auto-update: set the repo variable EXTENSION_UPDATE_URL to your
        # canonical https://<host>/extension/updates.json and it's baked into the
        # signed manifest here. Left out of the committed manifest on purpose —
        # it's deployment-specific, not something the public repo should pin.
        if: ${{ vars.EXTENSION_UPDATE_URL != '' }}
        env:
          UPDATE_URL: ${{ vars.EXTENSION_UPDATE_URL }}
        run: |
          python3 - <<'PY'
          import json, os
          p = "job-board/firefox-plugin/manifest.json"
          m = json.load(open(p))
          m.setdefault("browser_specific_settings", {}).setdefault("gecko", {})["update_url"] = os.environ["UPDATE_URL"]
          json.dump(m, open(p, "w"), indent=2)
          print("injected gecko.update_url =", os.environ["UPDATE_URL"])
          PY

      - name: Sign (unlisted) via AMO
        id: sign
        # continue-on-error: AMO has rejected web-ext's post-approval polling
        # token ("JWT exp is too long", 2026-07-20) AFTER the upload was
        # accepted and signed server-side — the recovery step below fetches
        # the signed file directly in that case. web-ext pinned for
        # deterministic behavior.
        continue-on-error: true
        run: |
          npx --yes web-ext@10.5.0 sign \
            --channel=unlisted \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --source-dir=job-board/firefox-plugin \
            --artifacts-dir=web-ext-artifacts

      - name: Recover the signed xpi from AMO (when signing errored post-upload)
        if: steps.sign.outcome == 'failure'
        env:
          AMO_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          python3 - <<'PY'
          import os, time, hmac, hashlib, base64, json, uuid, urllib.request
          def b64url(b): return base64.urlsafe_b64encode(b).rstrip(b"=").decode()
          def jwt():
              now = int(time.time())
              h = b64url(json.dumps({"alg": "HS256", "typ": "JWT"}).encode())
              p = b64url(json.dumps({"iss": os.environ["AMO_ISSUER"],
                                     "jti": str(uuid.uuid4()),
                                     "iat": now - 5, "exp": now + 240}).encode())
              sig = b64url(hmac.new(os.environ["AMO_SECRET"].encode(),
                                    f"{h}.{p}".encode(), hashlib.sha256).digest())
              return f"{h}.{p}.{sig}"
          def get(url, raw=False):
              req = urllib.request.Request(url, headers={"Authorization": f"JWT {jwt()}"})
              with urllib.request.urlopen(req, timeout=60) as r:
                  return r.read() if raw else json.load(r)
          want = json.load(open("job-board/firefox-plugin/manifest.json"))["version"]
          base = "https://addons.mozilla.org/api/v5/addons/addon/job-fit-scorer@devdull.lol"
          for attempt in range(6):
              data = get(f"{base}/versions/?filter=all_with_unlisted&page_size=10")
              hit = next((v for v in data.get("results", [])
                          if v.get("version") == want and (v.get("file") or {}).get("url")), None)
              if hit:
                  blob = get(hit["file"]["url"], raw=True)
                  os.makedirs("web-ext-artifacts", exist_ok=True)
                  path = f"web-ext-artifacts/job_fit_scorer-{want}.xpi"
                  open(path, "wb").write(blob)
                  print(f"recovered signed {want} from AMO ({len(blob)} bytes)")
                  break
              print(f"version {want} not signed yet; retry {attempt + 1}/6")
              time.sleep(30)
          else:
              raise SystemExit(f"{want} never appeared signed on AMO — real signing failure")
          PY

      - name: Require a signed artifact
        run: ls web-ext-artifacts/*.xpi

      - name: Add a stable-named copy
        # A predictable asset name (job-fit-scorer.xpi) lets the image build pull
        # it from releases/download/plugin-latest/ without knowing web-ext's
        # versioned filename. Renaming a signed xpi is safe (signature is inside).
        run: |
          src=$(ls web-ext-artifacts/*.xpi | head -1)
          cp "$src" web-ext-artifacts/job-fit-scorer.xpi

      - uses: actions/upload-artifact@v4
        with:
          name: signed-xpi
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error

      - name: Publish to the plugin-latest release
        # Floating release the image build fetches from. make_latest:false so it
        # doesn't displace the Gemini Actions' latest (vX.Y.Z) release.
        uses: softprops/action-gh-release@v3
        with:
          tag_name: plugin-latest
          name: Firefox extension (latest signed)
          make_latest: "false"
          files: web-ext-artifacts/*.xpi

  # Rebuild the container image so it bakes in the just-signed plugin. Runs after
  # the asset is published to plugin-latest, which the build then fetches.
  build-image:
    needs: sign
    uses: ./.github/workflows/build-job-store.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
